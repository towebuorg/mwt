version: 2

project_name: mwt

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: mwt
    main: .
    binary: mwt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: mwt
    ids:
      - mwt
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: towebuorg
    name: mwt
  draft: false
  prerelease: auto
  mode: replace

homebrew_casks:
  - name: mwt
    ids:
      - mwt
    binaries:
      - mwt
    repository:
      owner: towebuorg
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/towebuorg/mwt
    description: Multi-worktree Git workflow coordinator for independent repositories
